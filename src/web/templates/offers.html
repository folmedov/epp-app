{% extends "base.html" %}

{% block title %}Ofertas — Job Tracker{% endblock %}

{% block content %}
<section class="filters">
    <form id="filter-form">
        <div class="search-row">
            <label for="q">Buscar</label>
            <input id="q" name="q" type="search" placeholder="Buscar título o palabra clave" class="filter-field search-field" autocomplete="off"
                hx-get="/offers/partial?sort={{ sort|default('') }}&sort_dir={{ sort_dir|default('desc') }}"
                hx-target="#results"
                hx-trigger="keyup changed delay:500ms"
                hx-include="#filter-form .filter-field">
        </div>
        <label for="region">Región
            <select id="region" name="region" class="filter-field"
                hx-get="/offers/partial?sort={{ sort|default('') }}&sort_dir={{ sort_dir|default('desc') }}"
                hx-target="#results"
                hx-trigger="change"
                hx-include="#filter-form .filter-field">
                <option value="">Todas</option>
                {% for r in regions %}
                <option value="{{ r }}">{{ r }}</option>
                {% endfor %}
            </select>
        </label>

        <label for="city">Ciudad
            <select id="city" name="city" class="filter-field"
                hx-get="/offers/partial?sort={{ sort|default('') }}&sort_dir={{ sort_dir|default('desc') }}"
                hx-target="#results"
                hx-trigger="change"
                hx-include="#filter-form .filter-field">
                <option value="">Todas</option>
                {% for c in cities %}
                <option value="{{ c }}">{{ c }}</option>
                {% endfor %}
            </select>
        </label>

        <label for="institution">Institución
            <select id="institution" name="institution" class="filter-field"
                hx-get="/offers/partial?sort={{ sort|default('') }}&sort_dir={{ sort_dir|default('desc') }}"
                hx-target="#results"
                hx-trigger="change"
                hx-include="#filter-form .filter-field">
                <option value="">Todas</option>
                {% for i in institutions %}
                <option value="{{ i }}">{{ i }}</option>
                {% endfor %}
            </select>
        </label>

        <label for="state">Estado
            <select id="state" name="state" class="filter-field"
                hx-get="/offers/partial?sort={{ sort|default('') }}&sort_dir={{ sort_dir|default('desc') }}"
                hx-target="#results"
                hx-trigger="change"
                hx-include="#filter-form .filter-field">
                <option value="">Todos</option>
                {% for s in states %}
                <option value="{{ s }}">{{ s }}</option>
                {% endfor %}
            </select>
        </label>
    </form>
</section>

<section id="results">
    {% include "partials/offers_table.html" %}
</section>
{% endblock %}
